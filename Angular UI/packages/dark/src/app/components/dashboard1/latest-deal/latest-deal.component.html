<mat-card class="cardWithShadow mb-0!">
    <mat-card-content>
        <div class="flex justify-between items-baseline">
            <div>
                <mat-card-title>Latest Deal</mat-card-title>
                <mat-card-subtitle>Last 7 days</mat-card-subtitle>
            </div>
            <span class="bg-light-primary text-xs font-medium px-2.5 py-1 rounded-full text-primary">86.5%</span>
        </div>
        <div class="my-10">
            <div class="flex items-center justify-between">
                <h6 class="text-base">$98,500</h6>
                <h6 class="text-base">$1,22,900</h6>
            </div>
            <mat-progress-bar class="my-2" mode="determinate" color="success" value="80"></mat-progress-bar>
            <p class="text-sm text-muted font-medium m-0">Coupons used: 18/22</p>
        </div>
        <h6 class="text-sm mb-1.5">Recent Purchasers</h6>
        <div class="flex items-center">
            <img src="assets/images/profile/user-5.jpg" alt="user-1"
                class="rounded-full -ml-2.5 border-2 border-white cursor-pointer first:ml-0" width="40" />
            <img src="assets/images/profile/user-2.jpg" alt="user-2"
                class="rounded-full -ml-2.5 border-2 border-white cursor-pointer first:ml-0" width="40" />
            <img src="assets/images/profile/user-3.jpg" alt="user-3"
                class="rounded-full -ml-2.5 border-2 border-white cursor-pointer first:ml-0" width="40" />
            <img src="assets/images/profile/user-4.jpg" alt="user-4"
                class="rounded-full -ml-2.5 border-2 border-white cursor-pointer first:ml-0" width="40" />
            <span
                class="size-10 bg-light-primary text-primary rounded-full -ml-2.5 border-2 border-white cursor-pointer flex items-center justify-center text-decoration-none">+8
            </span>
        </div>
    </mat-card-content>
</mat-card>
