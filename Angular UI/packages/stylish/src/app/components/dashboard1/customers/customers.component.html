<mat-card class="cardWithShadow mb-0!">
    <mat-card-content>
        <div class="flex justify-between items-baseline">
            <div>
                <mat-card-title class="text-base">Customers</mat-card-title>
                <mat-card-subtitle>Last 7 days</mat-card-subtitle>
            </div>
            <div>
                <mat-card-title class="text-base text-right">6,380</mat-card-title>
                <span class="bg-light-success text-xs font-medium px-2.5 py-1 rounded-full text-success">+26.5%</span>
            </div>
        </div>

        <!-- chart -->
        <div class="my-6 pb-3">
            <apx-chart [series]="customersChart.series" [chart]="customersChart.chart" [stroke]="customersChart.stroke"
                [markers]="customersChart.markers" [tooltip]="customersChart.tooltip"></apx-chart>
        </div>
        <div class="flex items-center justify-between mb-2">
            <div class="flex items-center gap-2">
                <span class="w-4.5 h-2.5 bg-primary rounded-full"></span>
                <p class="text-sm text-muted my-0 font-medium">Apr 07 - Apr 14</p>
            </div>
            <p class="text-sm text-muted my-0 font-medium">6,380</p>
        </div>
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="w-4.5 h-2.5 bg-light rounded-full"></span>
                <p class="text-sm text-muted my-0 font-medium">Last Week</p>
            </div>
            <p class="text-sm text-muted my-0 font-medium">4,298</p>
        </div>
    </mat-card-content>
</mat-card>
