<mat-card class="cardWithShadow mb-0!">
    <mat-card-content>
        <div class="flex justify-between items-center mb-2.5">
            <mat-card-title>Annual Profit</mat-card-title>
            <div>
                <button mat-icon-button [matMenuTriggerFor]="menu">
                    <mat-icon>more_vert</mat-icon>
                </button>
                <mat-menu #menu="matMenu" xPosition="before">
                    <a href="javascript:void(0)" class="flex items-center py-2.5 px-4 gap-2">
                        <span>Action</span>
                    </a>
                    <a href="javascript:void(0)" class="flex items-center py-2.5 px-4 gap-2">
                        <span>Another action</span>
                    </a>
                    <a href="javascript:void(0)" class="flex items-center py-2.5 px-4 gap-2">
                        <span>Something else here</span>
                    </a>
                </mat-menu>
            </div>
        </div>

        <div class="bg-light-primary rounded-xl overflow-hidden mb-6">
            <div class="p-6">
                <div class="flex items-center justify-between">
                    <span class="text-sm">Conversion Rate</span>
                    <h4 class="text-xl font-semibold">18.4%</h4>
                </div>
            </div>
            <!-- chart -->
            <apx-chart [series]="annualprofitChart.series" [chart]="annualprofitChart.chart"
                [stroke]="annualprofitChart.stroke" [markers]="annualprofitChart.markers"
                [tooltip]="annualprofitChart.tooltip"></apx-chart>
        </div>

        <div class="flex gap-4 justify-between items-center pb-3 border-b border-border">
            <div>
                <span class="text-dark font-normal text-sm block">Added to Cart</span>
                <span class="text-sm text-muted font-medium mt-4">5 clicks</span>
            </div>
            <div class="text-right">
                <h5 class="font-normal text-base">$21,120.70</h5>
                <span class="text-success text-sm font-medium">+13.2%</span>
            </div>
        </div>
        <div class="flex gap-4 justify-between items-center pt-3">
            <div>
                <span class="text-dark font-normal text-sm block">Reached to Checkout</span>
                <span class="text-sm text-muted font-medium">12 clicks</span>
            </div>
            <div class="text-right">
                <h5 class="font-normal text-base">$16,100.00</h5>
                <span class="text-error text-sm font-medium">-7.4%</span>
            </div>
        </div>
    </mat-card-content>
</mat-card>
