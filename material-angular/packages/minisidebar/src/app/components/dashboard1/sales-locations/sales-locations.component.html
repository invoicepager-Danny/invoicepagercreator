<mat-card class="cardWithShadow mb-0!">
    <mat-card-content>
        <mat-card-title>Sales from Locations</mat-card-title>
        <mat-card-subtitle>4 top most countries</mat-card-subtitle>
        <div id="sales-locations" class="w-full h-[300px]"></div>
    </mat-card-content>
    <mat-card-content class="p-t-0 flex! flex-col gap-5">
        <div class="flex items-center justify-between gap-4">
            <span class="font-semibold text-sm">AE</span>
            <mat-progress-bar mode="determinate" value="28"></mat-progress-bar>
            <span class="font-semibold text-sm text-dark">28%</span>
        </div>
        <div class="flex items-center justify-between gap-4">
            <span class="font-semibold text-sm">AT</span>
            <mat-progress-bar mode="determinate" color="secondary" value="21"></mat-progress-bar>
            <span class="font-semibold text-sm text-dark">21%</span>
        </div>
        <div class="flex items-center justify-between gap-4">
            <span class="font-semibold text-sm">AU</span>
            <mat-progress-bar mode="determinate" color="error" value="18"></mat-progress-bar>
            <span class="font-semibold text-sm text-dark">18%</span>
        </div>
        <div class="flex items-center justify-between gap-4">
            <span class="font-semibold text-sm"> DE</span>
            <mat-progress-bar mode="determinate" value="12"></mat-progress-bar>
            <span class="font-semibold text-sm text-dark">12%</span>
        </div>
    </mat-card-content>
</mat-card>
