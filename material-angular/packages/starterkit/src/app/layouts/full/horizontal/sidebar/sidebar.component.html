@if(mobileQuery.matches){
<div class="horizontal-sidebar py-2 border-b border-border">
  <div class="container">
    <div>
      <div class="horizontal-navbar flex flex-row gap-4 items-center">
        @for(item of navItems; track item){
        <app-horizontal-nav-item [item]="item" class="parentBox {{ item.ddType }}">
        </app-horizontal-nav-item>
        }
      </div>
    </div>
  </div>
</div>
}
