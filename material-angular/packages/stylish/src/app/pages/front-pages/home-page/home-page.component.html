<div class="home-page">
  <mat-sidenav-container class="bg-white">
    <mat-sidenav-content>
      @if(hideCloserBtn){

      <mat-toolbar class="bg-auth! flex justify-between items-center relative toolbar">
        <div class="text-center text-white text-sm font-medium grow">
          <span class="text-white bg-secondary mx-3 text-xs px-2 py-1 rounded-md">New</span>
          Frontend Pages Included!
        </div>

        <button mat-icon-button aria-label="Close" class="text-white! ms-auto z-1" (click)="hideCloser()">
          <mat-icon>close</mat-icon>
        </button>
      </mat-toolbar>

      }

      <mat-toolbar class="topbar front-topbar topbar-xl m-auto py-2" [ngClass]="{ 'fixed-topbar': isTopbarFixed }">
        <div class="container px-0! xl:px-4!">
          <div class="flex items-center justify-between w-full">
            <div class="branding p-0!">
              <app-branding></app-branding>
            </div>

            <div class="navigation-tab hidden lg:flex justify-between toolBarContent">

              <button mat-button class="mx-2 text-base font-semibold nav-item" [routerLink]="['/front-pages/about']"
                [class.selected]="isActiveRoute('about')">
                About Us
              </button>
              <button mat-button class="mx-2 text-sm font-semibold nav-item" [class.selected]="isActiveRoute('blog')"
                [routerLink]="['/front-pages/blog']">
                Blogs
              </button>
              <button mat-button class="mx-2 text-base font-semibold nav-item" [routerLink]="['/front-pages/portfolio']"
                [class.selected]="isActiveRoute('portfolio')">
                Portfolio
                <span class="bg-light-primary text-primary rounded-md font-semibold px-2 py-1 text-xs ml-2">
                  New
                </span>
              </button>
              <button mat-button class="mx-2 text-base font-semibold nav-item"
                [class.selected]="isActiveRoute('dashboard')" [routerLink]="['/dashboards/dashboard1']">
                Dashboard
              </button>

              <button mat-button class="mx-2 text-base font-semibold nav-item"
                [class.selected]="isActiveRoute('pricing')" [routerLink]="['/front-pages/pricing']">
                Pricing
              </button>

              <button mat-button class="mx-2 text-base font-semibold nav-item"
                [class.selected]="isActiveRoute('contact')" [routerLink]="['/front-pages/contact']">
                Contact
              </button>

            </div>
            <div class="hidden lg:flex">
              <button mat-flat-button color="primary" [routerLink]="['/authentication/login']">
                Log In
              </button>
            </div>

            <button mat-icon-button (click)="filterNavRight.toggle()" class="flex lg:hidden!">
              <i-tabler name="menu-2" class="size-6! flex"></i-tabler>
            </button>
          </div>
        </div>
      </mat-toolbar>



      <div class="content-wrapper">
        <router-outlet></router-outlet>
      </div>
    </mat-sidenav-content>
    <mat-sidenav #filterNavRight mode="over" position="end" class="filter-sidebar mobile-sidebar">
      <div>
        <div class="flex items-center justify-between px-5 py-4">
          <div class="branding p-0!">
            <app-branding></app-branding>
          </div>
          <button mat-mini-fab aria-label="Example icon button with a heart icon" (click)="filterNavRight.toggle()">
            <mat-icon>close</mat-icon>
          </button>
        </div>

        <mat-list role="list">
          <mat-list-item role="listitem">
            <button mat-button class="text-dark" [routerLink]="['/front-pages/about']"
              [class.selected]="isActiveRoute('about')">
              About Us
            </button></mat-list-item>
          <mat-list-item role="listitem">
            <button mat-button class="text-dark" [class.selected]="isActiveRoute('blogs')"
              [routerLink]="['/front-pages/blog']">
              Blogs
            </button></mat-list-item>
          <mat-list-item role="listitem">
            <button mat-button class="text-dark" [routerLink]="['/front-pages/portfolio']"
              [class.selected]="isActiveRoute('portfolio')">
              Portfolio
              <span class="bg-light-primary text-primary rounded-xl font-semibold p-1.5 py-1 text-xs">
                New
              </span>
            </button></mat-list-item>
          <mat-list-item role="listitem">
            <button mat-button class="text-dark" [class.selected]="isActiveRoute('dashboard')"
              [routerLink]="['/dashboards/dashboard1']">
              Dashboard
            </button>
          </mat-list-item>
          <mat-list-item role="listitem">
            <button mat-button class="text-dark" [class.selected]="isActiveRoute('pricing')"
              [routerLink]="['/front-pages/pricing']">
              Pricing
            </button>
          </mat-list-item>
          <mat-list-item role="listitem">
            <button mat-button class="text-dark" [class.selected]="isActiveRoute('contact')"
              [routerLink]="['/front-pages/contact']">
              Contact
            </button></mat-list-item>
          <mat-list-item role="listitem" class="w-full">
            <a mat-flat-button color="primary" class="w-full" [routerLink]="'/authentication/login'">Get
              Started</a></mat-list-item>
        </mat-list>
      </div>
    </mat-sidenav>
  </mat-sidenav-container>
  @if(showBackToTop){
  <div class="back-to-top bg-primary rounded-full flex items-center justify-center shadow size-14! cursor-pointer"
    (click)="scrollToTop()">
    <i-tabler name="arrow-up" class="size-6! text-white"></i-tabler>
  </div>
  }
</div>
